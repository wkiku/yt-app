<VirtualHost *:80>
    ServerName localhost

    # WSGIデーモンの設定
    # user/group に www-data を指定し、venv 内の python パスを指定します
    WSGIDaemonProcess ytapp user=www-data group=www-data threads=5 python-home=/opt/venv python-path=/app lang=C.UTF-8 locale=C.UTF-8
    WSGIScriptAlias / /app/app.wsgi

    <Directory /app>
        WSGIProcessGroup ytapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # ログ出力先
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
