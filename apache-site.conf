<VirtualHost *:443>
    ServerName localhost

SSLEngine on
    # 自己署名証明書のパス
    SSLCertificateFile /etc/pki/tls/private/server.crt
    SSLCertificateKeyFile /etc/pki/tls/private/server.key

    # --- WebDAV 設定 (最優先) ---
    Alias /webdav /var/www/webdav
    <Directory /var/www/webdav>
        DAV On
        SSLRequireSSL
        Options +Indexes
        AuthType Basic
        AuthName WebDAV
        AuthUserFile /etc/httpd/conf/.htpasswd
        
        <RequireAny>
            Require method GET POST OPTIONS
            # 書き込み(PUT/DELETE等)には認証を必須にする設定
            Require valid-user
        </RequireAny>
    </Directory>
        # WSGIデーモンの設定
    # user/group に www-data を指定し、venv 内の python パスを指定します
    WSGIDaemonProcess ytapp user=apache group=apache threads=5 python-home=/opt/venv python-path=/app lang=C.UTF-8 locale=C.UTF-8
    WSGIScriptAlias / /app/app.wsgi

    <Directory /app>
        WSGIProcessGroup ytapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # ログ出力先
    ErrorLog /etc/httpd/logs/error.log
    CustomLog /etc/httpd/logs/access.log combined
</VirtualHost>
